name: Releases to CurseForge and/or Modrinth

on:
  workflow_dispatch:
    inputs:
      mod_version:
        description: 'Optional version override (leave empty to use gradle.properties)'
        required: false
        default: ''
      publish_modrinth:
        description: 'Publish to Modrinth'
        required: false
        default: 'false'
      publish_curseforge:
        description: 'Publish to CurseForge'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up JDK 8 (toolchain for compilation)
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'zulu'

      - name: Set up JDK 21 (Gradle runner)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: gradle

      - name: Resolve build version
        id: version
        run: |
          if [ -n "${{ inputs.mod_version }}" ]; then
            sed -i "s/^mod_version = .*/mod_version = ${{ inputs.mod_version }}/" gradle.properties
            VERSION="${{ inputs.mod_version }}"
          else
            VERSION="$(grep -E '^mod_version\s*=' gradle.properties | head -n1 | cut -d'=' -f2 | xargs)"
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
        
      - name: Add permission
        run: chmod +x ./gradlew
        
      - name: Execute Gradle build
        run: ./gradlew build --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wrapperitas-${{ steps.version.outputs.value }}
          path: build/libs/*.jar

      - name: Publish to Modrinth/CurseForge (optional)
        if: inputs.publish_modrinth == 'true' || inputs.publish_curseforge == 'true'
        uses: Kir-Antipov/mc-publish@v3.3.0
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: |
            build/libs/!(*-@(dev|sources|javadoc)).jar
            build/libs/*-@(dev|sources|javadoc).jar
          loaders: forge
          game-versions: 1.12.2
          java: 8
          version: ${{ steps.version.outputs.value }}
          changelog: Automated publish from workflow run.
