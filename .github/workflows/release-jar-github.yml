name: Build and Release to GitHub

on:
  workflow_dispatch:
    inputs:
      mod_version:
        description: 'Optional mod version override (leave empty to use gradle.properties)'
        required: false
        default: ''

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 8 (toolchain for compilation)
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'zulu'

    - name: Set up JDK 25 (Gradle runner)
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: gradle

    - name: Resolve build version
      id: version
      run: |
        if [ -n "${{ inputs.mod_version }}" ]; then
          sed -i "s/^mod_version = .*/mod_version = ${{ inputs.mod_version }}/" gradle.properties
          VERSION="${{ inputs.mod_version }}"
        else
          VERSION="$(grep -E '^mod_version\s*=' gradle.properties | head -n1 | cut -d'=' -f2 | xargs)"
        fi
        echo "value=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build --no-daemon

    - name: Find built jar
      run: echo "JAR_PATH=$(ls build/libs/*.jar | head -n1)" >> $GITHUB_ENV

    - name: Create or Update GitHub Release and upload asset
      uses: ncipollo/release-action@v1
      with:
        tag: v${{ steps.version.outputs.value }}
        name: wrapperitas-${{ steps.version.outputs.value }}
        body: |
          Release for version ${{ steps.version.outputs.value }}
        draft: false
        prerelease: false
        artifacts: ${{ env.JAR_PATH }}
        token: ${{ secrets.GITHUB_TOKEN }}
