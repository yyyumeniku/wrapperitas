name: Build Jar Only

on:
  workflow_dispatch:
    inputs:
      mod_version:
        description: 'Optional mod version override (leave empty to use gradle.properties)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 8 (toolchain for compilation)
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'zulu'

    - name: Set up JDK 21 (Gradle runner)
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'
        cache: gradle

    - name: Resolve build version
      id: version
      run: |
        if [ -n "${{ inputs.mod_version }}" ]; then
          sed -i "s/^mod_version = .*/mod_version = ${{ inputs.mod_version }}/" gradle.properties
          VERSION="${{ inputs.mod_version }}"
        else
          VERSION="$(grep -E '^mod_version\s*=' gradle.properties | head -n1 | cut -d'=' -f2 | xargs)"
        fi
        echo "value=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build --no-daemon

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: wrapperitas-${{ steps.version.outputs.value }}
        path: build/libs/*.jar
