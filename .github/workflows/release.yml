name: Releases

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 8 (toolchain for compilation)
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'zulu'

      - name: Set up JDK 25 (Gradle runner)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle
      - name: Add permission
        run: chmod +x ./gradlew
      - name: Execute Gradle build
        run: ./gradlew build --no-daemon

      - uses: ncipollo/release-action@v1.20.0
        with:
          artifacts: "build/libs/*"
          generateReleaseNotes: true
